# ──────────────────────────────────────────────────────────────
# BƯỚC 1: Thêm vào pubspec.yaml
# ──────────────────────────────────────────────────────────────

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.10.5+9

  # AI - Phát hiện khuôn mặt (Google)
  google_ml_kit: ^0.16.3

  # AI - Chạy mô hình TFLite (MobileFaceNet)
  tflite_flutter: ^0.10.4

  # Xử lý ảnh (crop, resize)
  image: ^4.1.7

  # HTTP - Gọi API server
  http: ^1.2.0

flutter:
  assets:
    - assets/mobilefacenet.tflite   # Mô hình AI nhận diện mặt


# ──────────────────────────────────────────────────────────────
# BƯỚC 2: Tải mô hình TFLite
# ──────────────────────────────────────────────────────────────
#
# Tải file mobilefacenet.tflite từ link sau:
# https://github.com/sirius-ai/MobileFaceNet_TF/blob/master/output_model/MobileFaceNet.tflite
#
# Hoặc tìm "mobilefacenet.tflite" trên Google / Kaggle.
# Đặt file vào thư mục: your_app/assets/mobilefacenet.tflite


# ──────────────────────────────────────────────────────────────
# BƯỚC 3: Cấp quyền Android
# ──────────────────────────────────────────────────────────────
#
# File: android/app/src/main/AndroidManifest.xml
# Thêm vào trước thẻ <application>:
#
# <uses-permission android:name="android.permission.CAMERA"/>
# <uses-feature android:name="android.hardware.camera" android:required="false"/>


# ──────────────────────────────────────────────────────────────
# BƯỚC 4: Cấp quyền iOS
# ──────────────────────────────────────────────────────────────
#
# File: ios/Runner/Info.plist
# Thêm vào trong thẻ <dict>:
#
# <key>NSCameraUsageDescription</key>
# <string>Ứng dụng cần camera để nhận diện khuôn mặt chấm công.</string>


