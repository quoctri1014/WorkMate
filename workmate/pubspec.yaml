name: workmate
description: WorkMate - Ứng dụng Chấm Công Thông Minh
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.2.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_database: ^11.0.0
  firebase_messaging: ^15.0.0
  firebase_storage: ^12.1.0

  # Auth
  google_sign_in: ^6.2.1
  local_auth: ^2.1.8

  # Location & Maps
  geolocator: ^11.0.0
  google_maps_flutter: ^2.5.3

  # WiFi
  network_info_plus: 4.1.0

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # Charts
  fl_chart: ^0.67.0

  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  percent_indicator: ^4.2.3
  table_calendar: ^3.1.2

  # Utils
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  url_launcher: ^6.2.6
  path_provider: ^2.1.3
  uuid: ^4.4.0
  camera: ^0.10.5+9
  google_mlkit_face_detection: any
  tflite_flutter: ^0.12.1
  image: ^4.1.7
  http: ^1.2.0
  socket_io_client: ^2.0.3+1
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

dependency_overrides:
  win32: ^5.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/mobilefacenet.tflite
