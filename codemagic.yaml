workflows:
  ios-build:
    name: Build iOS (Đồ Án)
    instance_type: mac_mini_m1
    working_directory: workmate
    environment:
      flutter: default
    scripts:
      - name: Lấy các thư viện
        script: |
          flutter pub upgrade google_mlkit_face_detection google_mlkit_commons
          flutter pub get
          cd ios
          pod repo update
      - name: Biên dịch iOS (Lách luật Apple)
        script: flutter build ios --release --no-codesign
      - name: Đóng gói thành file .ipa
        script: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r app_do_an.ipa Payload
    artifacts:
      - "**/app_do_an.ipa"
